<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  @font-face {
    font-family: "Cormorant Garamond";
    font-style: normal;
    font-weight: 300 600;
    src: url("assets/cormorant-normal.woff2") format("woff2");
  }
  @font-face {
    font-family: "Cormorant Garamond";
    font-style: italic;
    font-weight: 300 600;
    src: url("assets/cormorant-italic.woff2") format("woff2");
  }
  @font-face {
    font-family: "Jost";
    font-style: normal;
    font-weight: 300 600;
    src: url("assets/jost.woff2") format("woff2");
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
  }

  .card {
    position: relative;
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #FFFFFF 0%, #F7F6F3 55%, #EEECE6 100%);
    display: flex;
    align-items: stretch;
  }

  .grain {
    position: absolute;
    inset: 0;
    opacity: 0.05;
    mix-blend-mode: multiply;
    background-image: radial-gradient(circle at 20% 30%, rgba(26,23,18,0.4) 0, transparent 40%),
                       radial-gradient(circle at 80% 70%, rgba(26,23,18,0.3) 0, transparent 45%);
  }

  .text-panel {
    position: relative;
    z-index: 2;
    width: 56%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 0 0 78px;
  }

  .eyebrow {
    font-family: "Jost", sans-serif;
    font-weight: 500;
    font-size: 15px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: #8A6A3E;
    margin-bottom: 26px;
  }

  .wordmark {
    font-family: "Cormorant Garamond", serif;
    font-weight: 400;
    font-size: 96px;
    letter-spacing: 0.16em;
    color: #121110;
    line-height: 1;
  }

  .rule {
    width: 84px;
    height: 2px;
    background: linear-gradient(90deg, #B08D57, transparent);
    margin: 30px 0 28px 4px;
  }

  .tagline {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-weight: 400;
    font-size: 44px;
    color: #1F1E1B;
    line-height: 1.15;
    max-width: 520px;
  }

  .sub {
    margin-top: 24px;
    font-family: "Jost", sans-serif;
    font-weight: 400;
    font-size: 19px;
    color: #6b5f55;
    max-width: 460px;
    line-height: 1.5;
  }

  .image-panel {
    position: relative;
    z-index: 1;
    width: 44%;
    height: 100%;
    overflow: hidden;
  }

  .image-panel img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: 50% 40%;
  }

  .image-fade {
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, #F7F6F3 0%, rgba(247,246,243,0) 14%);
  }

  .corner-mark {
    position: absolute;
    bottom: 44px;
    left: 78px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 2;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #B08D57;
  }

  .corner-text {
    font-family: "Jost", sans-serif;
    font-size: 14px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: #8A6A3E;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="grain"></div>
    <div class="text-panel">
      <span class="eyebrow">The Ear Cuff Collection</span>
      <div class="wordmark">Charmora</div>
      <div class="rule"></div>
      <div class="tagline">Wear your<br/>story</div>
      <p class="sub">Gold and silver ear cuffs, worn without a piercing &mdash; each one a story you get to wear.</p>
    </div>
    <div class="image-panel">
      <img src="../public/images/product-studio.webp" />
      <div class="image-fade"></div>
    </div>
    <div class="corner-mark">
      <span class="dot"></span>
      <span class="corner-text">charmora.com</span>
    </div>
  </div>
</body>
</html>
